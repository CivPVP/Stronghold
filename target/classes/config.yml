  vault_set: "&bVault set for &f{team}&b."
  team_created: "&bTeam &f{team}&b created."
  team_deleted: "&cTeam &f{team}&c deleted."
  invalid_color: "&cInvalid color. Valid colors: WHITE, ORANGE, MAGENTA, LIGHT_BLUE, YELLOW, LIME, PINK, GRAY, LIGHT_GRAY, CYAN, PURPLE, BLUE, BROWN, GREEN, RED, BLACK"
