teams:
  max_teams: 16

broadcast:
  carrier_interval_seconds: 30
  carrier_message: "&f{player} is carrying {flags} at {x}, {y}, {z} in {world}!"
  flag_stolen_message: "&f{player} stole &b{team}'s Flag&f!"
  flag_dropped_message: "&f{player} dropped &b{team}'s Flag&f at {x}, {y}, {z}!"
  flag_returned_message: "&b{team}'s Flag has returned to its vault."

bossbar:
  countdown_title: "&fFlag deployment in: &b{time}"
  active_title: "&fEvent ends in: &b{time}"
  paused_title: "&7[PAUSED] &f— &b{time} &fremaining"
  tiebreak_countdown_title: "&fTie-break starts in: &b{time}"
  tiebreak_active_title: "&fTie-break ends in: &b{time}"
  color: BLUE
  style: SOLID

tab:
  prefix_enabled: true
  name_color_enabled: true

glow:
  enabled: true

event:
  default_countdown_duration: "1d"
  default_endgame_duration: "2d"
  default_tiebreak_countdown_duration: "10m"
  default_tiebreak_active_duration: "30m"
  carrier_effects_active_phase_only: true

protection:
  prevent_flag_burn: true
  prevent_flag_in_non_vault_containers: true

flags_gui:
  title: "&f&lFlag Status"
  in_vault_icon: GREEN_BANNER
  held_icon: YELLOW_BANNER
  dropped_icon: RED_BANNER
  filler_material: BLACK_STAINED_GLASS_PANE

sounds:
  flag_stolen: BLOCK_NOTE_BLOCK_BASS
  flag_returned: BLOCK_CHEST_OPEN
  event_start: ENTITY_ENDER_DRAGON_GROWL
  event_end: UI_TOAST_CHALLENGE_COMPLETE
  winner_announce: ENTITY_PLAYER_LEVELUP

event_end:
  title_winner: "&b{team} wins!"
  title_tie: "&fTie! Multiple teams win!"
  subtitle: "&fWith &b{count}&f flag(s) captured"
  broadcast_message: "&fEvent ended! Winner(s): {teams} &fwith {count} flag(s)!"

messages:
  not_op: "&cYou must be an operator to use this command."
  not_captain: "&cYou must be a team captain to use this command."
  not_in_team: "&cYou are not on a team."
